    <style>
        body {
            font-family: 'Noto Serif Tamil', serif;
            background-color: #050c08; /* Deep dark obsidian green background */
        }
        .arabic-text {
            font-family: 'Amiri', serif;
        }

        /* Intense Neon Green Glow Effects */
        .neon-border {
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3), inset 0 0 15px rgba(34, 197, 94, 0.2);
            border: 2px solid #22c55e;
        }
        .neon-text-green {
            text-shadow: 0 0 8px rgba(34, 197, 94, 0.8), 0 0 20px rgba(34, 197, 94, 0.4);
        }
        .neon-text-gold {
            text-shadow: 0 0 8px rgba(234, 179, 8, 0.7);
        }

        /* Floating Genie Lamp Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-lamp {
            animation: float 4s ease-in-out infinite;
        }

        /* Smoke Canvas Positioning */
        #smokeCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>

                tamil: "அல்லாஹ்வின் வழிகாட்டுதலைப் பின்பற்றுங்கள். (47)",
                reference: "அல்குர்ஆன்"
            },
            {
                arabic: "قُرْآن 48",
                tamil: "அல்லாஹ்வின் வழிகாட்டுதலைப் பின்பற்றுங்கள். (48)",
                reference: "அல்குர்ஆன்"
            },
            {
                arabic: "قُرْآن 49",
                tamil: "அல்லாஹ்வின் வழிகாட்டுதலைப் பின்பற்றுங்கள். (49)",
                reference: "அல்குர்ஆன்"
            },
            {
                arabic: "قُرْآن 50",
                tamil: "அல்லாஹ்வின் வழிகாட்டுதலைப் பின்பற்றுங்கள். (50)",
                reference: "அல்குர்ஆன்"
            }
        ];

        function loadDailyQuote() {
            const today = new Date();
            const dayCounter = Math.floor(today.getTime() / (1000 * 60 * 60 * 24));
            
            const quoteIndex = dayCounter % myCustomQuotesList.length;
            const todaysQuote = myCustomQuotesList[quoteIndex];

            document.getElementById('arabic-display').innerText = todaysQuote.arabic;
            document.getElementById('tamil-display').innerText = `"${todaysQuote.tamil}"`;
            document.getElementById('reference-display').innerText = todaysQuote.reference;
        }

        // --- Smoke Simulation Engine ---
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 20 + 10;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1.2 - 0.4; 
                this.maxLife = Math.random() * 100 + 80;
                this.life = this.maxLife;
                this.opacity = Math.random() * 0.25 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.size += 0.15; 
                this.life--;
            }

            draw() {
                let currentOpacity = (this.life / this.maxLife) * this.opacity;
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `rgba(34, 197, 94, ${currentOpacity})`); 
                gradient.addColorStop(0.5, `rgba(22, 163, 74, ${currentOpacity * 0.4})`); 
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); 
                
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function getLampPositions() {
            const leftLamp = document.getElementById('left-lamp').getBoundingClientRect();
            const rightLamp = document.getElementById('right-lamp').getBoundingClientRect();
            return [
                { x: leftLamp.left + leftLamp.width / 2, y: leftLamp.top + leftLamp.height / 3 },
                { x: rightLamp.left + rightLamp.width / 2, y: rightLamp.top + rightLamp.height / 3 }
            ];
        }

        function animateSmoke() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (document.getElementById('left-lamp')) {
                const lamps = getLampPositions();
                lamps.forEach(lamp => {
                    if(Math.random() < 0.12) { 
                        particles.push(new Particle(lamp.x, lamp.y));
                    }
                });
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateSmoke);
        }

        window.onload = function() {
            loadDailyQuote();
            animateSmoke();
        };
    </script>
