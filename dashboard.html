<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>// SMARTY__2.0_MAIN_TERMINAL_ //</title>
    <style>
        /* --- MATRIX COLOR DEFINITIONS --- */
        :root {
            --matrix-black: #020204;
            --matrix-darkgreen: #003300;
            --matrix-puregreen: #00ff66;
            --matrix-glow: rgba(0, 255, 102, 0.3);
            --matrix-dim: #008f11;
            --matrix-text: #d2ffd9;
            
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--matrix-black);
            color: var(--matrix-text);
            font-family: var(--font-mono);
            line-height: 1.6;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- BACKGROUND MATRIX RAIN CANVAS --- */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.22; /* Slightly increased opacity for larger rain columns */
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
            z-index: 10;
        }

        /* --- GLOW EFFECTS --- */
        .neon-glow {
            color: var(--matrix-puregreen);
            text-shadow: 0 0 8px var(--matrix-glow), 0 0 15px var(--matrix-glow);
        }

        .terminal-border {
            border: 1px solid var(--matrix-puregreen);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.15), inset 0 0 15px rgba(0, 255, 102, 0.1);
        }

        /* --- CORE IDENTITY COMPONENT --- */
        .profile-container {
            text-align: center;
            background: rgba(2, 2, 4, 0.9);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(5px);
            text-decoration: none;
            display: block;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-container:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 35px rgba(0, 255, 102, 0.25), inset 0 0 20px rgba(0, 255, 102, 0.15);
        }

        .avatar-frame {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            border: 2px solid var(--matrix-puregreen);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--matrix-glow);
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            background: var(--matrix-darkgreen);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--matrix-puregreen);
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .username {
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 0.4rem;
        }

        .sys-status {
            color: var(--matrix-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
        }

        .terminal-bio {
            font-size: 0.95rem;
            border-top: 1px dashed var(--matrix-darkgreen);
            padding-top: 1.5rem;
            color: var(--matrix-text);
        }
    </style>
</head>
<body>

    <!-- BACKGROUND MATRIX STREAM ANIMATION -->
    <canvas id="matrix-canvas"></canvas>

    <div class="container">

        <!-- CORE IDENTITY COMPONENT (Entire box links to Instagram) -->
        <a href="https://instagram.com/Smarty__2.0" target="_blank" class="profile-container terminal-border">
            <div class="avatar-frame">
                <div class="avatar-fallback">S_2.0</div>
            </div>
            <h1 class="username neon-glow" id="scramble-username">Smarty__2.0</h1>
            <p class="sys-status">[ ACCESS_MAINFRAME ]</p>
            
            <p class="terminal-bio">
                Welcome to the architecture. Jacked into the matrix, routing frequency patterns, and developing interactive workflows.
            </p>
        </a>

    </div>

    <!-- SCRIPTS FOR ACTIVE CANVAS AND MATRIX GLITCH -->
    <script>
        // --- MATRIX RAIN EFFECT ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const matrixChars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
        const charArr = matrixChars.split("");
        
        // Increased font size from 14 to 22 for bigger code rain blocks
        const fontSize = 22; 
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrixRain() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff66';
            ctx.font = 'bold ' + fontSize + 'px monospace'; // Added bold for better definition at larger scale

            for (let i = 0; i < drops.length; i++) {
                const text = charArr[Math.floor(Math.random() * charArr.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrixRain, 33);

        // --- USERNAME BOOT TEXT SCRAMBLE ---
        const cryptoPool = "X02__SYSTEM_CORE_ERROR_NULL_";
        let loop = null;
        const targetElement = document.getElementById("scramble-username");
        const finalOutput = targetElement.innerText;
        let setupIndex = 0;

        loop = setInterval(() => {
            targetElement.innerText = finalOutput
                .split("")
                .map((char, index) => {
                    if(index < setupIndex) return finalOutput[index];
                    return cryptoPool[Math.floor(Math.random() * cryptoPool.length)];
                })
                .join("");
            
            if(setupIndex >= finalOutput.length) clearInterval(loop);
            setupIndex += 1 / 3;
        }, 40);
    </script>

</body>
</html>
